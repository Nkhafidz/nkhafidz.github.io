<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — NotesMe</title>
  <meta name="description" content="Login pribadi NotesMe." />
  <meta name="theme-color" content="#0f172a" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='22' fill='%230f172a'/%3E%3Cpath d='M27 25h42v8H27zm0 17h42v8H27zm0 17h30v8H27z' fill='%23f8fafc'/%3E%3Ccircle cx='70' cy='66' r='9' fill='%23f59e0b'/%3E%3C/svg%3E" />
  <script src="auth.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
  <div class="bg-orb orb-one"></div>
  <div class="bg-orb orb-two"></div>
  <div class="bg-grid"></div>

  <main class="login-shell container">
    <section class="login-card" aria-labelledby="loginTitle">
      <a class="brand login-brand" href="./" aria-label="NotesMe Home">
        <span class="brand-mark">N</span>
        <span class="brand-text">NotesMe</span>
      </a>

      <span class="eyebrow">Private Access</span>
      <h1 id="loginTitle">Masuk ke NotesMe</h1>
      <p class="login-subtitle">Halaman ini hanya untuk akses pribadi. Masukkan username dan password untuk membuka dashboard.</p>

      <form class="login-form" id="loginForm" autocomplete="off">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" inputmode="text" autocomplete="username" placeholder="Masukkan username" required />

        <label for="password">Password</label>
        <div class="password-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Masukkan password" required />
          <button type="button" id="togglePassword">Tampilkan</button>
        </div>

        <p class="auth-message" id="loginMessage" role="status" aria-live="polite"></p>
        <button class="btn primary login-submit" type="submit">Masuk</button>
      </form>
    </section>
  </main>
</body>
</html>
